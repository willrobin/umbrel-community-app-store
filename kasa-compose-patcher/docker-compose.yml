version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: web
      APP_PORT: 5000

  web:
    image: python:3.11-slim
    init: true
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -q flask gunicorn pyyaml &&
             exec gunicorn --bind 0.0.0.0:5000 --workers 2 --timeout 120 server:app"
    environment:
      DATA_DIR: /data
      PORT: "5000"
    volumes:
      - /home/umbrel/compose-patcher:/data
      - /home/umbrel/compose-patcher/ui/server.py:/app/server.py:ro
      - /home/umbrel/compose-patcher/ui/templates:/app/templates:ro
      - /home/umbrel/compose-patcher/ui/static:/app/static:ro
