version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: server
      APP_PORT: 18789

  init:
    image: ghcr.io/moltbot/moltbot:main
    user: "0:0"
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - chown -R 1000:1000 /home/node/.moltbot /home/node/clawd
    volumes:
      - ${APP_DATA_DIR}/data:/home/node/.moltbot
      - ${APP_DATA_DIR}/workspace:/home/node/clawd

  server:
    image: ghcr.io/moltbot/moltbot:main
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      # Gateway authentication token (auto-generated by Umbrel)
      CLAWDBOT_GATEWAY_TOKEN: "${APP_SEED}"
    command:
      - node
      - dist/index.js
      - gateway
      - --bind
      - lan
      - --port
      - "18789"
      - --allow-unconfigured
    volumes:
      - ${APP_DATA_DIR}/data:/home/node/.moltbot
      - ${APP_DATA_DIR}/workspace:/home/node/clawd
